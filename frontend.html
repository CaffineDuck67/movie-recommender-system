<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #e50914;
      --red-dk:  #b20710;
      --bg:      #080808;
      --surface: #141414;
      --card:    #1a1a1a;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8e8e8;
      --muted:   #888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      position: relative;
      padding: 80px 24px 60px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(229,9,20,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }
    .hero h1 span { color: var(--red); }

    .hero p {
      font-size: 16px;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .search-wrap {
      display: flex;
      max-width: 540px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: rgba(229,9,20,0.6); }

    .search-icon {
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .search-icon svg { width: 18px; height: 18px; }

    #search {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 16px 0;
    }
    #search::placeholder { color: var(--muted); }
    #search::-webkit-list-button { display: none; }

    #go-btn {
      background: var(--red);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 0 24px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    #go-btn:hover  { background: var(--red-dk); }
    #go-btn:active { transform: scale(0.97); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .section-header h2 { font-size: 20px; font-weight: 600; }
    .section-header .pill {
      font-size: 11px;
      font-weight: 600;
      background: rgba(229,9,20,0.15);
      color: var(--red);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .divider { flex: 1; height: 1px; background: var(--border); }

    #results {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(229,9,20,0.4);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #222;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }
    .card:hover .card-overlay { opacity: 1; }

    .overlay-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .card-body  { padding: 12px; }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-rank { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
      grid-column: 1 / -1;
    }
    .state-box svg { opacity: 0.25; }
    .state-box p   { color: var(--muted); font-size: 15px; }
    .state-box strong { color: var(--text); display: block; font-size: 17px; margin-bottom: 4px; }

    .error-msg {
      background: rgba(229,9,20,0.1);
      border: 1px solid rgba(229,9,20,0.3);
      color: #ff6b6b;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      margin-bottom: 28px;
      display: none;
    }

    .skeleton { animation: shimmer 1.4s infinite linear; }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skel-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .skel-img {
      aspect-ratio: 2/3;
      background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
      background-size: 600px 100%;
    }
    .skel-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .skel-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
      background-size: 600px 100%;
    }

    @media (max-width: 700px) {
      #results { grid-template-columns: repeat(2, 1fr); }
      .hero    { padding: 60px 20px 40px; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <p class="logo">✦ CineMatch</p>
    <h1>Find your next<br><span>favourite film</span></h1>
    <p>Type any movie you love and we'll find five you'll want to watch next.</p>

    <div class="search-wrap">
      <span class="search-icon">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input id="search" list="movie-list" placeholder="e.g. The Dark Knight" autocomplete="off" />
      <datalist id="movie-list"></datalist>
      <button id="go-btn" onclick="getRecommendations()">Recommend</button>
    </div>
  </section>

  <main>
    <div id="error-msg" class="error-msg"></div>

    <div id="results-section" style="display:none">
      <div class="section-header">
        <h2 id="section-title">Recommended for you</h2>
        <span class="pill">5 picks</span>
        <span class="divider"></span>
      </div>
      <div id="results"></div>
    </div>

    <div id="empty-state">
      <div class="state-box">
        <svg width="56" height="56" fill="none" stroke="#888" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.882v6.236a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
        <p><strong>No recommendations yet</strong>Search for a movie above to get started.</p>
      </div>
    </div>
  </main>

  <script>
    const API = "http://localhost:8000";

    async function loadMovies() {
      try {
        const res  = await fetch(`${API}/movies`);
        const data = await res.json();
        const dl   = document.getElementById("movie-list");
        data.movies.forEach(m => {
          const opt   = document.createElement("option");
          opt.value   = m;
          dl.appendChild(opt);
        });
      } catch (_) {}
    }

    function showSkeletons() {
      document.getElementById("empty-state").style.display     = "none";
      document.getElementById("results-section").style.display = "block";
      document.getElementById("results").innerHTML = Array(5).fill(`
        <div class="skel-card">
          <div class="skel-img skeleton"></div>
          <div class="skel-body">
            <div class="skel-line skeleton" style="width:80%"></div>
            <div class="skel-line skeleton" style="width:50%"></div>
          </div>
        </div>
      `).join("");
    }

    function showError(msg) {
      const el          = document.getElementById("error-msg");
      el.textContent    = msg;
      el.style.display  = "block";
      document.getElementById("results-section").style.display = "none";
      document.getElementById("empty-state").style.display     = "block";
    }

    function clearError() {
      document.getElementById("error-msg").style.display = "none";
    }

    async function getRecommendations() {
      const movie = document.getElementById("search").value.trim();
      clearError();

      if (!movie) { showError("Please enter a movie name."); return; }

      showSkeletons();

      try {
        const res = await fetch(`${API}/recommend/${encodeURIComponent(movie)}`);

        if (!res.ok) {
          showError(`Movie not found: "${movie}". Try another title.`);
          return;
        }

        const data = await res.json();

        document.getElementById("section-title").textContent =
          `Because you liked "${data.movie}"`;

        document.getElementById("results").innerHTML =
          data.recommendations.map((r, i) => `
            <div class="card" onclick="searchMovie('${r.title.replace(/'/g, "\\'")}')">
              <div class="card-img-wrap">
                <img
                  src="${r.poster}"
                  alt="${r.title}"
                  loading="lazy"
                  onerror="this.onerror=null;this.src='https://placehold.co/500x750/1a1a1a/888888?text=No+Poster'"
                />
                <div class="card-overlay">
                  <button class="overlay-btn">Find similar</button>
                </div>
              </div>
              <div class="card-body">
                <p class="card-title">${r.title}</p>
                <p class="card-rank">Pick #${i + 1}</p>
              </div>
            </div>
          `).join("");

      } catch (err) {
        showError("Could not connect to the server. Make sure the API is running.");
      }
    }

    function searchMovie(title) {
      document.getElementById("search").value = title;
      getRecommendations();
    }

    document.getElementById("search").addEventListener("keydown", e => {
      if (e.key === "Enter") getRecommendations();
    });

    loadMovies();
  </script>
</body>
</html>
